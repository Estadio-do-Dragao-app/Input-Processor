# Mosquitto configuration file (Simplified + Verbose Logging)

# Listeners
listener 1883 0.0.0.0
protocol mqtt

listener 9001 0.0.0.0
protocol websockets

# Security
allow_anonymous true

# Persistence (DESATIVADA)
persistence false

# Logging (Verbose para debugging)
log_dest stdout
# log_type all inclui: error, warning, notice, information, subscribe, unsubscribe
log_type all
# Para ver mensagens PUBLISH e fluxo de dados
connection_messages true
